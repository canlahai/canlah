name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Demo-mode e2e gates real user flows (upload‚Üíanalyse‚Üísave‚Üílist‚Üíexport), auth,
# admin, and the deep-health check ‚Äî all in demo mode, with NO external creds and
# NO writes to any real database.
#
# The supabase-persistence suite is NOT run in CI: it creates and deletes report
# rows, and there is no dedicated test Supabase project (the only creds are prod).
# It's API-driven and runnable locally against a throwaway project:
#   PLAYWRIGHT_SUPABASE_MODE=1 SUPABASE_URL=‚Ä¶ SUPABASE_SERVICE_KEY=‚Ä¶ npm run test:e2e:supabase
# To bring it into CI later, stand up a dedicated TEST project, add its creds as
# repo secrets (never prod), and add a secret-gated job. Persistence is otherwise
# covered by lib reports unit tests, /api/health?deep=1, and manual canaries.
jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        node-version: [20]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run demo e2e (Playwright manages the dev server)
        run: npx playwright test --reporter=dot --reporter=junit

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-junit
          path: test-results
          retention-days: 7
