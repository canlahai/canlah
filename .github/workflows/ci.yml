name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Demo-mode e2e gates real user flows (uploadâ†’analyseâ†’saveâ†’listâ†’export), auth,
# admin, and the deep-health check â€” all in demo mode, with NO external creds and
# NO writes to any real database.
#
# The supabase-persistence suite is intentionally NOT run here. It needs a live
# backend, and pointing it at the production Supabase project would write/delete
# test rows in prod on every PR. To run it in CI, stand up a DEDICATED test
# Supabase project, set its creds as repo secrets, rework the spec to seed reports
# via the save API (not the real Anthropic analyse flow), then add a gated job.
# Until then, persistence is covered by: lib reports unit tests, /api/health?deep=1
# reachability, and manual saveâ†’listâ†’delete canaries. Run locally with
# `npm run test:e2e:supabase` against a test project.
jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        node-version: [20]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run demo e2e (Playwright manages the dev server)
        run: npx playwright test --reporter=dot --reporter=junit

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-junit
          path: test-results
          retention-days: 7
