name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Demo-mode e2e gates real user flows (upload→analyse→save→list→export), auth,
# admin, and the deep-health check — all in demo mode, with NO external creds and
# NO writes to any real database.
#
# The supabase-persistence suite runs in a separate, secret-gated `test-supabase`
# job — API-driven (no Anthropic), against a DEDICATED TEST Supabase project whose
# creds are in repo secrets. NEVER point those secrets at prod: the suite
# creates/deletes report rows. If the secrets are absent the job is skipped.
jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        node-version: [20]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run demo e2e (Playwright manages the dev server)
        run: npx playwright test --reporter=dot --reporter=junit

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-junit
          path: test-results
          retention-days: 7

  # `secrets` can't be referenced in a job-level `if:`, so surface presence as a
  # job output and gate the supabase job on it.
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      has_supabase: ${{ steps.check.outputs.has_supabase }}
    steps:
      - id: check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_SERVICE_KEY" ]; then
            echo "has_supabase=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_supabase=false" >> "$GITHUB_OUTPUT"
          fi

  # Persistence e2e against a DEDICATED TEST Supabase project (repo secrets must
  # NOT point at prod — the suite creates/deletes rows). Only runs when set.
  test-supabase:
    needs: check-secrets
    if: needs.check-secrets.outputs.has_supabase == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-
      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium
      - name: Run persistence e2e (API-driven)
        env:
          PLAYWRIGHT_SUPABASE_MODE: '1'
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ACCESS_PASSWORD: ci-test-access-password
          SESSION_SECRET: ci-test-secret-do-not-use-in-prod
        run: npx playwright test e2e/supabase-persistence.spec.js --reporter=dot --reporter=junit
      - name: Upload Supabase JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-supabase-junit
          path: test-results
          retention-days: 7
