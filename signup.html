<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign up — CanLah.ai</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0c0c0a;--paper:#f2efe8;--yellow:#e8c027;--orange:#d95f2b;--slate:#1e1e1b;--g7:#363632;--g4:#888882}
  *{box-sizing:border-box;margin:0}
  body{font-family:'Syne',sans-serif;background:var(--ink);color:var(--paper);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;text-align:center}
  .card{max-width:460px;background:var(--slate);border:1px solid var(--g7);border-radius:16px;padding:2.5rem 2rem}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--orange);letter-spacing:.14em;text-transform:uppercase;margin-bottom:14px}
  h1{font-size:28px;font-weight:800;letter-spacing:-.02em;margin-bottom:10px}
  p{color:var(--g4);font-size:15px;line-height:1.6;margin-bottom:1rem}
  a.btn{display:inline-block;background:var(--yellow);color:var(--ink);font-weight:700;text-decoration:none;padding:11px 20px;border-radius:8px;margin:6px}
  a.ghost{display:inline-block;color:var(--paper);text-decoration:none;border:1px solid var(--g7);padding:11px 20px;border-radius:8px;margin:6px}
  a.link{color:var(--yellow)}
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Early access</div>
    <h1>Accounts are invite-only</h1>
    <p>CanLah is in a pilot. Accounts are set up by our team for now — there's no open sign-up yet.
       Want in? Email <a class="link" href="mailto:hello@canlah.ai?subject=CanLah%20access">hello@canlah.ai</a> and we'll get you onboarded.</p>
    <a class="btn" href="mailto:hello@canlah.ai?subject=CanLah%20access">Request access</a>
    <a class="ghost" href="/login">I have an account → Sign in</a>
    <p style="margin-top:1.5rem;margin-bottom:0"><a class="link" href="/">← Back home</a></p>
  </div>
</body>
</html>
